name: baets
description: A Flutter project connected with Firebase
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.68.0
  
  # PDF generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Firebase packages
  firebase_core: 3.12.0
  firebase_auth: 5.3.0
  cloud_firestore: 5.4.0
  firebase_storage: ^12.3.4

  # Image handling (used for BOTH profile pictures AND receipt scanning)
  image_picker: ^1.1.2

  # Receipt Scanning (OCR)
  google_mlkit_text_recognition: ^0.15.1

  # Common Flutter packages
  cupertino_icons: 1.0.5
  provider: 6.1.5
  google_generative_ai: ^0.4.7
  http: ^1.6.0
  fluttertoast: ^9.0.0
  lottie: ^3.1.2  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 2.0.1

flutter:
  uses-material-design: true
  assets:               # ← add this
    - assets/animations/